name: Weekly JBG Catalog Scrub

on:
  workflow_dispatch:
    # No scheduled cron — scrub-glove-prices.yml handles the Monday 09:00 UTC run.
    # Trigger this workflow manually from the Actions tab when needed.
    inputs:
      live_update:
        description: "Set to 'true' to write changes to the sheet (default: dry-run)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  scrub:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run JBG catalog scrub
        env:
          GOOGLE_SHEETS_CLIENT_EMAIL: ${{ secrets.GOOGLE_SHEETS_CLIENT_EMAIL }}
          GOOGLE_SHEETS_PRIVATE_KEY: ${{ secrets.GOOGLE_SHEETS_PRIVATE_KEY }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_TAB_NAME: ${{ vars.GOOGLE_SHEETS_TAB_NAME || 'Glove-template' }}
          LIVE_UPDATE: ${{ github.event.inputs.live_update || vars.LIVE_UPDATE || 'false' }}
        run: |
          if [ "$LIVE_UPDATE" = "true" ]; then
            echo "Running LIVE scrub — will write changes to Google Sheets"
            npm run scrub:glove-prices
          else
            echo "Running DRY-RUN scrub — no Sheets writes"
            npm run scrub:glove-prices:dry-run
          fi

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glove-price-scrub-report
          path: reports/glove-price-scrub-*.{json,md}
          retention-days: 90

      - name: Commit reports
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: weekly JBG price scrub report $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
